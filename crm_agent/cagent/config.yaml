llm:
  active_provider: "deepseek"

  deepseek:
    provider: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-v4-flash"

  temperature: 0.7
  max_tokens: 10000
  timeout: 7200

context:
  max_tokens: 40000
  compress_threshold: 0.8
  history_limit: 50
  recent_history_limit: 10

streaming:
  max_tool_calls: 200
  max_reflection_iterations: 3
